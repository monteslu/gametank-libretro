name: Build core

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# GameTank's core is dependency-light: no libnode, no GL, no submodules, no
# prebuilt artifacts to fetch. Each job is just "compiler + our Makefile", so the
# matrix stays lean. Where the built lib matches the runner arch we also run the
# dlopen harness against a real .gtr (catches a broken CORE, not just a broken link).
jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-22.04        # older image => lower glibc floor for the .so
            lib: gametank_libretro.so
            make: make
            shell: bash
            harness: true
          - platform: linux-aarch64
            runner: ubuntu-22.04-arm
            lib: gametank_libretro.so
            make: make
            shell: bash
            harness: true
          - platform: macos-aarch64
            runner: macos-14
            lib: gametank_libretro.dylib
            make: make
            shell: bash
            harness: true
          - platform: macos-x86_64
            runner: macos-14             # cross-compile x86_64 on the arm64 runner
            lib: gametank_libretro.dylib
            make: make CXXFLAGS_EXTRA=-arch\ x86_64 LDFLAGS_EXTRA=-arch\ x86_64
            shell: bash
            harness: false               # can't run an x86_64 dylib on the arm64 host
          - platform: windows-x86_64
            runner: windows-2022
            lib: gametank_libretro.dll
            make: make
            shell: 'msys2 {0}'
            harness: false
          - platform: android-arm64
            runner: ubuntu-22.04
            lib: gametank_libretro.so
            make: make platform=android
            shell: bash
            harness: false               # NDK cross-build, no on-host run
    runs-on: ${{ matrix.runner }}
    # Run every step in bash. On Windows, the msys2 step below puts an msys2 bash
    # + clang + make + zip on PATH; GitHub's `shell: bash` then uses it. This
    # avoids a dynamic shell expression (the {0} template inside a ${{ }} ternary
    # is what GitHub's workflow parser rejected).
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - uses: actions/checkout@v6

      # Linux/macOS: clang++ (the Makefile default) is already present.
      # Windows: install the LLVM/clang++ toolchain + make + zip via msys2.
      - name: Set up clang toolchain (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          install: mingw-w64-clang-x86_64-clang make zip

      - name: Build
        if: matrix.platform != 'android-arm64'
        run: ${{ matrix.make }}

      - name: Build (Android NDK cross)
        if: matrix.platform == 'android-arm64'
        run: make platform=android NDK="$ANDROID_NDK_LATEST_HOME" API=24

      # Best-effort runtime smoke test: load the core and render a real .gtr.
      # NON-FATAL — the build artifacts are the deliverable; this same-arch check
      # is a bonus signal (and can hit glibc/toolchain skew on a given runner), so
      # it must not gate the build. Output stays visible in the log either way.
      - name: Harness (render a real .gtr) [non-fatal]
        if: matrix.harness
        continue-on-error: true
        run: |
          make test || { echo "harness build failed (non-fatal)"; exit 0; }
          curl -sL -o hello.gtr \
            https://raw.githubusercontent.com/clydeshaffer/GameTankEmulator/master/roms/hello.gtr
          ./test/harness hello.gtr 30 || echo "harness run failed (non-fatal — core build is what matters)"

      - name: Package
        run: |
          mkdir -p dist
          strip "${{ matrix.lib }}" 2>/dev/null || true
          zip -j "dist/gametank_libretro-${{ matrix.platform }}.zip" "${{ matrix.lib }}" gametank_libretro.info

      - uses: actions/upload-artifact@v7
        with:
          name: gametank_libretro-${{ matrix.platform }}
          path: dist/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with: { merge-multiple: true }
      - uses: softprops/action-gh-release@v3
        with:
          files: gametank_libretro-*.zip
